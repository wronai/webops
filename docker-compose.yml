version: '3.8'

services:
  webops-voice:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    container_name: webops-voice
    ports:
      - "8000:8000"  # API and web interface
    volumes:
      - ./logs:/app/logs
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker commands
      - ./uploads:/app/uploads
    environment:
      - PYTHONPATH=/app
      - NLP2CMD_HOST=0.0.0.0
      - NLP2CMD_PORT=8000
      - NLP2CMD_DEBUG=false
      - NLP2CMD_LOG_LEVEL=info
      - NLP2CMD_AUTO_EXECUTE=true
      - WORKSPACE_DIR=/app/workspace
    restart: unless-stopped
    networks:
      - webops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: webops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - webops-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: webops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - webops-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Add reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: webops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - webops-voice
    networks:
      - webops-network
    restart: unless-stopped
    profiles:
      - production

networks:
  webops-network:
    driver: bridge

volumes:
  logs:
  workspace:
  uploads:
  prometheus-data:
  grafana-data:
